<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pasta-Trockner</title>
  <link rel="stylesheet" href="/static/style.css?v=19" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🍝 <span>Pasta-Trockner</span></div>
    <div class="meta">
      <span id="mode-badge" class="badge">–</span>
      <span id="conn" class="conn">verbinde…</span>
    </div>
  </header>

  <div id="fault" class="fault hidden">
    <span id="fault-text"></span>
    <button id="fault-reset" class="btn">Quittieren &amp; entriegeln</button>
  </div>
  <div id="banner" class="banner hidden"></div>

  <nav class="tabs">
    <button class="ptab active" data-ptab="home">Home</button>
    <button class="ptab" data-ptab="trockner">Trockner</button>
    <button class="ptab" data-ptab="steuerung">Steuerung</button>
    <button class="ptab" data-ptab="programme">Programme</button>
  </nav>

  <!-- Tab: Home -->
  <section class="panel" data-panel="home">
    <div class="dash">
      <section class="card kpi-card">
        <div class="kpi-label">Temperatur ⌀</div>
        <div class="kpi-val t"><b id="temp">–</b><span class="kpi-unit">°C</span></div>
        <div class="kpi-sub" id="temp-sub"></div>
      </section>
      <section class="card kpi-card">
        <div class="kpi-label">Feuchte ⌀</div>
        <div class="kpi-val h"><b id="hum">–</b><span class="kpi-unit">% rF</span></div>
        <div class="kpi-sub" id="hum-sub"></div>
      </section>

      <section class="card">
        <h2>Aktuelles Programm</h2>
        <div id="prog-running" class="hidden">
          <div class="prog-name" id="prog-name"></div>
          <div class="prog-phase" id="prog-phase"></div>
          <div class="prog-bar"><div id="prog-bar-fill"></div></div>
          <div class="band" id="band"></div>
        </div>
        <div id="prog-empty" class="cp-empty">Kein Programm aktiv – im <b>Steuerung</b>-Tab wählen und starten.</div>
      </section>

      <section class="card span-all">
        <div class="card-head">
          <h2>Verlauf <small id="hist-stat"></small></h2>
          <div class="chart-controls">
            <select id="hist-range">
              <option value="1">1 h</option><option value="6">6 h</option>
              <option value="24">24 h</option><option value="72" selected>72 h</option>
            </select>
            <button id="hist-metric" class="btn ghost sm">Feuchte</button>
            <button id="hist-refresh" class="btn ghost sm">↻</button>
            <a id="hist-csv" class="btn ghost sm" href="/api/history.csv?hours=72" download>CSV</a>
            <button id="hist-clear" class="btn ghost sm danger">Löschen</button>
          </div>
        </div>
        <canvas id="hist-canvas"></canvas>
        <div id="hist-legend" class="legend"></div>
      </section>
    </div>
  </section>

  <!-- Tab: Trockner -->
  <section class="panel hidden" data-panel="trockner">
    <section class="card span-all">
      <div class="card-head">
        <h2>Trockner <small>Seitenansicht · Sensoren live</small></h2>
        <span id="dryer-side" class="sub"></span>
      </div>
      <div id="dryer"></div>
    </section>
  </section>

  <!-- Tab: Steuerung -->
  <section class="panel hidden" data-panel="steuerung">
    <section class="card">
      <h2>Steuerung</h2>
      <div class="modes">
        <button data-mode="off" class="mode">Aus</button>
        <button data-mode="manual" class="mode">Manuell</button>
        <button data-mode="program" class="mode">Programm</button>
      </div>
      <div id="manual-card" class="hidden sub-block">
        <div class="toggles" id="manual-toggles"></div>
      </div>
      <div id="program-card" class="hidden sub-block">
        <select id="program-select"></select>
        <div class="row">
          <button id="program-start" class="btn primary">Start</button>
          <button id="program-stop" class="btn hidden">Stopp</button>
        </div>
        <div id="program-status" class="prog-status hidden">
          <button id="program-skip" class="btn ghost">Phase überspringen ⏭</button>
        </div>
      </div>
    </section>
  </section>

  <!-- Tab: Programme -->
  <section class="panel hidden" data-panel="programme">
    <section class="card">
      <div class="card-head">
        <h2>Programme bearbeiten</h2>
        <button id="prog-new" class="btn ghost sm">+ Neues Programm</button>
      </div>
      <div id="prog-editor"></div>
    </section>
  </section>

  <footer id="foot"></footer>
  <script src="/static/app.js?v=19"></script>
</body>
</html>
