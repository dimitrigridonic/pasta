# Pasta-Trockner — Konfiguration (zigbee2mqtt / MQTT).
# Geräte werden über ihre z2m friendly_names angesprochen.

mqtt:
  host: localhost
  port: 1883

web:
  host: 0.0.0.0      # vom Handy im WLAN erreichbar
  port: 8000

control:
  poll_interval: 15          # Sekunden zwischen Regel-Ticks (liest MQTT-Cache)
  aggregate: average         # average | max | min — wie aus den Sensoren EIN Regelwert wird
  temp_low: 30               # Heizungen AN unterhalb (°C)
  temp_high: 32              # Heizungen AUS oberhalb (°C)
  max_temp: 38               # harte Sicherheits-Abschaltung der Heizungen (°C)
  humidity_hysteresis: 3     # Reserve über der Ideallinie (% rF)
  fan_cycle_min: 5           # Heizung & Lüfter wechseln links/rechts alle X Min (< heater_max_on!)
  rate_window_min: 40        # Messfenster für die Feuchte-Abfallrate (Anzeige)
  heater_min_on: 5           # Heizung Mindest-Laufzeit (Min, Trägheit)
  heater_min_off: 5          # Heizung Mindest-Pause (Min)
  fan_stall_h: 5             # Lüfter erst wenn Feuchte über so viele Stunden stillsteht
  fan_stall_drop: 1.0        # … und dabei < diesem Abfall (%-Punkte)
  heater_max_on: 6           # SICHERHEIT: Heizung-Dauerlauf > X Min -> verriegelnder Not-Aus
  preheat_enabled: true      # Vorheizen (leerer Kasten) vor dem Programm
  preheat_min: 30            # ZEITBASIERT: beide Heizungen volle Leistung so lange (Min),
                             # dann Programmstart. Kein Sensor im Kasten -> rein über Zeit.
                             # Startwert; mit beiden Heizungen heizt es schneller -> kalibrieren.
  side_bias_min: 2.5         # ab dieser Feuchte-Differenz L/R (%rF) wird die feuchtere Seite geheizt
                             # (statt stur abzuwechseln); darunter normaler Seitenwechsel im Takt

# Relais-Kanäle: l1 = Heizung, l2 = Lüfter (per Leistungsmessung verifiziert)
heaters:
  - { name: "Heizung links",  device: "Relais links",  prop: state_l1 }
  - { name: "Heizung rechts", device: "Relais rechts", prop: state_l1 }
fans:
  - { name: "Lüfter links",   device: "Relais links",  prop: state_l2 }
  - { name: "Lüfter rechts",  device: "Relais rechts", prop: state_l2 }

# Sensoren = z2m friendly_names (Push: Werte kommen von selbst, keine Batterie-Kosten)
sensors:
  - "Sensor 1"
  - "Sensor 2"
  - "Sensor 3"
  - "Sensor 4"
  - "Sensor 5"
  - "Sensor 6"

# Links/Rechts-Zuordnung für die intelligente Heizseiten-Wahl.
# Die feuchtere Seite wird geheizt; eine schon trockenere Seite NICHT.
# Mitte (Sensor 1 & 4) bleibt neutral -> zählt nur zum Gesamtwert (Ideallinie/Ruhephase).
sides:
  left:  ["Sensor 2", "Sensor 6"]
  right: ["Sensor 3", "Sensor 5"]

# Feuchte-Referenz: an diesen Leit-Sensoren orientiert sich die Regelung (Ideallinie/Ruhephase).
# Leer = Schnitt ALLER Sensoren. Die untere Reihe (6,4,5) trocknet zuerst -> dort orientieren,
# damit unten nicht übertrocknet, während der Gesamtschnitt noch ok aussieht.
# Im UI live umschaltbar (Alle ⌀ <-> Untere).
humidity_guide: ["Sensor 6", "Sensor 4", "Sensor 5"]

logging:
  enabled: true
  file: history.db
  interval: 60

# Trocken-Programme (Seed; im Browser editierbar -> programs.json)
programs:
  - name: "Maccheroni (16-20-20-12)"
    phases:
      - { name: "80% halten", duration_h: 16, humidity_start: 80, humidity_end: 80 }
      - { name: "80→70%",     duration_h: 20, humidity_start: 80, humidity_end: 70 }
      - { name: "70→60%",     duration_h: 20, humidity_start: 70, humidity_end: 60 }
      - { name: "60→50%",     duration_h: 12, humidity_start: 60, humidity_end: 50 }

  - name: "Caserecce (10-10-5)"
    phases:
      - { name: "80% halten", duration_h: 10, humidity_start: 80, humidity_end: 80 }
      - { name: "80→70%",     duration_h: 10, humidity_start: 80, humidity_end: 70 }
      - { name: "70→60%",     duration_h: 5,  humidity_start: 70, humidity_end: 60 }

  - name: "Test (schnell, 6 min)"
    phases:
      - { name: "Test 80%", duration_h: 0.0333, humidity_start: 80, humidity_end: 80 }
      - { name: "Test 70%", duration_h: 0.0333, humidity_start: 80, humidity_end: 70 }
      - { name: "Test 60%", duration_h: 0.0333, humidity_start: 70, humidity_end: 60 }
